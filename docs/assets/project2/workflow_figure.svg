<svg width="1800" height="1200" viewBox="0 0 1800 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcfbf8"/>
      <stop offset="100%" stop-color="#f3f6f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f1720" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#6a7a86"/>
    </marker>
    <style>
      .title { font: 700 52px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #16222f; }
      .subtitle { font: 400 24px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #596a77; }
      .section { font: 700 28px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #22313f; }
      .stepTitle { font: 700 30px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #1e2d39; }
      .stepBody { font: 400 22px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #364654; }
      .panelBody { font: 400 21px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #364654; }
      .small { font: 400 18px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #667784; }
      .chip { font: 600 18px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #30414e; }
      .label { font: 600 18px 'PingFang SC','Microsoft YaHei',sans-serif; fill: #6a7a86; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>

  <text x="90" y="95" class="title">项目 2：动态细胞耦合建模原型流程图</text>
  <text x="90" y="140" class="subtitle">核心思想：先把单细胞表达压缩成稳定模块，再比较 “A 模块状态是否更能预测 B 模块速度”，最后用 donor-held-out 双向检验筛选方向边</text>

  <g filter="url(#shadow)">
    <rect x="70" y="205" width="1660" height="420" rx="34" ry="34" fill="#ffffff" stroke="#dde4e8" stroke-width="2"/>
  </g>

  <text x="110" y="258" class="section">一、从单细胞表达走到方向性比较</text>

  <rect x="110" y="305" width="290" height="250" rx="28" ry="28" fill="#e8f0f7" stroke="#8aa7c2" stroke-width="2.5"/>
  <rect x="505" y="305" width="290" height="250" rx="28" ry="28" fill="#edf3e7" stroke="#96ac83" stroke-width="2.5"/>
  <rect x="900" y="305" width="290" height="250" rx="28" ry="28" fill="#f7ecdf" stroke="#d29a58" stroke-width="2.5"/>
  <rect x="1295" y="305" width="340" height="250" rx="28" ry="28" fill="#efe6f3" stroke="#ab8eb8" stroke-width="2.5"/>

  <text x="140" y="355" class="stepTitle">1. 状态表示</text>
  <text x="140" y="405" class="stepBody">按细胞类型使用固定 signature</text>
  <text x="140" y="438" class="stepBody">计算每个细胞的模块分数</text>
  <text x="140" y="482" class="small">得到 cell-type specific module scores</text>
  <rect x="140" y="508" width="190" height="30" rx="15" fill="#dbe7f2"/>
  <text x="235" y="529" text-anchor="middle" class="chip">24 个固定节点</text>

  <text x="535" y="355" class="stepTitle">2. 近似动态量</text>
  <text x="535" y="405" class="stepBody">在每个细胞类型内部</text>
  <text x="535" y="438" class="stepBody">用伪时间邻域差分近似 dM/dt</text>
  <text x="535" y="482" class="small">得到每个模块的局部变化速度</text>
  <rect x="535" y="508" width="180" height="30" rx="15" fill="#dfead4"/>
  <text x="625" y="529" text-anchor="middle" class="chip">局部方向信息</text>

  <text x="930" y="355" class="stepTitle">3. donor 配对</text>
  <text x="930" y="405" class="stepBody">在每个 stage 内</text>
  <text x="930" y="438" class="stepBody">把 sender score 与 receiver velocity</text>
  <text x="930" y="471" class="stepBody">汇总到 donor 交集</text>
  <rect x="930" y="508" width="205" height="30" rx="15" fill="#f1dfc7"/>
  <text x="1032" y="529" text-anchor="middle" class="chip">只在交集 donor 上拟合</text>

  <text x="1325" y="355" class="stepTitle">4. 双向检验</text>
  <text x="1325" y="405" class="stepBody">比较 A score → dB/dt</text>
  <text x="1325" y="438" class="stepBody">与 B score → dA/dt</text>
  <text x="1325" y="482" class="small">leave-one-donor-out + permutation</text>
  <rect x="1325" y="508" width="220" height="30" rx="15" fill="#e8def0"/>
  <text x="1435" y="529" text-anchor="middle" class="chip">筛方向，不做静态相关</text>

  <path d="M400 468 C440 468, 460 468, 505 468" fill="none" stroke="#6a7a86" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M795 468 C835 468, 855 468, 900 468" fill="none" stroke="#6a7a86" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1190 468 C1230 468, 1250 468, 1295 468" fill="none" stroke="#6a7a86" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="690" width="800" height="395" rx="32" ry="32" fill="#ffffff" stroke="#dde4e8" stroke-width="2"/>
    <rect x="930" y="690" width="800" height="395" rx="32" ry="32" fill="#ffffff" stroke="#dde4e8" stroke-width="2"/>
  </g>

  <text x="110" y="748" class="section">二、方向边是怎么判定的</text>
  <text x="110" y="804" class="panelBody">• forward ΔR²：A score 对 dB/dt 的 held-out 预测增益</text>
  <text x="110" y="846" class="panelBody">• reverse ΔR²：B score 对 dA/dt 的 held-out 预测增益</text>
  <text x="110" y="888" class="panelBody">• empirical p：与 donor 打乱后的 null distribution 比较</text>
  <text x="110" y="930" class="panelBody">• direction call：forward_stronger / reverse_stronger / weak</text>
  <text x="110" y="995" class="small">解释重点：这一步在比较“谁更像上游”，不是比较谁和谁一起变化。</text>

  <text x="970" y="748" class="section">三、这套原型已经跑通到哪一步</text>
  <text x="970" y="804" class="panelBody">• 输入：SCP2154 liver 分阶段单细胞数据</text>
  <text x="970" y="846" class="panelBody">• 规模：24,547 cells，165 signature genes，24 nodes</text>
  <text x="970" y="888" class="panelBody">• 输出：483 条双向边测试，80 条保留 stage-chain edges</text>
  <text x="970" y="930" class="panelBody">• 重点：41 条 hepatocyte 相关边，可继续组织成候选机制链</text>
  <rect x="970" y="982" width="610" height="38" rx="19" fill="#f2f5f7"/>
  <text x="1275" y="1007" text-anchor="middle" class="chip">从“静态组学分析”推进到“状态 → 速度”的方向性比较</text>
</svg>
